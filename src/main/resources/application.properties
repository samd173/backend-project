# =========================================
# 🔥 APPLICATION NAME
# =========================================
spring.application.name=backend

# =========================================
# 🔥 SERVER CONFIG
# =========================================
server.port=8082

# =========================================
# 🔥 DATABASE CONFIG (POSTGRESQL - RENDER)
# =========================================
spring.datasource.url=jdbc:postgresql://dpg-d7ahbr0ule4c739girt0-a.oregon-postgres.render.com:5432/agromart_db
spring.datasource.username=agromart_db_user
spring.datasource.password=hjLKZnWUisnCPeDMFo3L0nLLIVlmJbyi
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# 🔥 JPA / HIBERNATE CONFIG
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# 🔥 LOGGING
# =========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================================
# 🔥 CORS CONFIG
# =========================================
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# =========================================
# 🔥 FILE UPLOAD
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================
# 🔥 JACKSON
# =========================================
spring.jackson.serialization.fail-on-empty-beans=false

# =========================================
# 🔥 DEVTOOLS
# =========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true